<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱玩机的学生-cpp - 博客主页</title>
<style>
/* 全局重置 */
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}

/* 浅色模式默认样式 */
:root {
  --bg-color: #f7f8fa;
  --text-color: #333;
  --card-bg: #fff;
  --title-color: #222;
  --link-color: #0066cc;
  --meta-color: #999;
  --excerpt-color: #555;
  --shadow-color: 0 2px 10px rgba(0,0,0,0.05);
  --desc-color: #666;
}

/* 暗黑模式样式 */
[data-theme="dark"] {
  --bg-color: #18181b;
  --text-color: #e4e4e7;
  --card-bg: #27272a;
  --title-color: #f4f4f5;
  --link-color: #74ccf4;
  --meta-color: #a1a1aa;
  --excerpt-color: #d4d4d8;
  --shadow-color: 0 2px 10px rgba(0,0,0,0.2);
  --desc-color: #a1a1aa;
}

/* 基础样式 */
body{
  background:var(--bg-color);
  color:var(--text-color);
  line-height:1.7;
  max-width:960px;
  margin:0 auto;
  padding:30px 20px;
  transition: background 0.3s, color 0.3s;
}

/* 头部样式 */
header{
  text-align:center;
  margin-bottom:40px;
  position:relative;
}

/* 主题切换按钮 */
.theme-toggle {
  position: absolute;
  top: 0;
  right: 0;
  background: var(--card-bg);
  border: none;
  color: var(--text-color);
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  box-shadow: var(--shadow-color);
  transition: all 0.3s;
}

.theme-toggle:hover {
  opacity: 0.8;
}

.blog-title{
  font-size:32px;
  font-weight:bold;
  color:var(--title-color);
  margin-bottom:10px;
}

.blog-desc{
  font-size:16px;
  color:var(--desc-color);
}

/* 文章列表 */
.article-list{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.article-card{
  background:var(--card-bg);
  border-radius:12px;
  padding:24px;
  box-shadow:var(--shadow-color);
  transition: background 0.3s, box-shadow 0.3s;
}

.article-title{
  font-size:20px;
  font-weight:bold;
  color:var(--link-color);
  text-decoration:none;
  display:block;
  margin-bottom:6px;
  transition: color 0.3s;
}

.article-title:hover{
  opacity:0.8;
}

.article-meta{
  font-size:13px;
  color:var(--meta-color);
  margin:6px 0 12px;
}

.article-excerpt{
  font-size:15px;
  color:var(--excerpt-color);
}

/* 页脚样式 */
footer{
  text-align:center;
  margin-top:60px;
  font-size:14px;
  color:var(--meta-color);
}
</style>
</head>
<body>

<header>
  <div class="blog-title">爱玩机的学生-cpp 的博客</div>
  <div class="blog-desc">玩机｜C++｜折腾｜分享</div>
  <button class="theme-toggle" id="themeToggle">切换暗黑模式</button>
</header>

<div class="article-list">
  <div class="article-card">
    <a href="article1.html" class="article-title">我的 GitHub Pages 博客搭建完成</a>
    <div class="article-meta">2026-05-04 · 博客搭建</div>
    <div class="article-excerpt">从零开始搭建极简博客，免费、稳定、永久在线。</div>
  </div>

  <div class="article-card">
    <a href="article2.html" class="article-title">C++ 入门学习笔记（持续更新）</a>
    <div class="article-meta">2026-05-04 · 编程学习</div>
    <div class="article-excerpt">从零基础开始学 C++，记录每一步踩坑与收获。</div>
  </div>

  <div class="article-card">
    <a href="article3.html" class="article-title">软件使用体验吐槽</a>
    <div class="article-meta">2026-05-04 · 玩机折腾</div>
    <div class="article-excerpt">实测软件们的各种离谱瞬间，真实使用感受。</div>
  </div>
</div>

<footer>
  © 2024-2026 爱玩机的学生-cpp | 基于 GitHub Pages 搭建
</footer>

<script>
// 检测系统主题
const detectSystemTheme = () => {
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
};

// 设置主题
const setTheme = (theme) => {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('user-theme', theme); // 保存用户偏好
  updateToggleText(theme);
};

// 更新切换按钮文本
const updateToggleText = (theme) => {
  const toggleBtn = document.getElementById('themeToggle');
  toggleBtn.textContent = theme === 'dark' ? '切换浅色模式' : '切换暗黑模式';
};

// 初始化主题
const initTheme = () => {
  const savedTheme = localStorage.getItem('user-theme');
  const systemTheme = detectSystemTheme();
  const initialTheme = savedTheme || systemTheme;
  setTheme(initialTheme);
};

// 绑定切换事件
document.getElementById('themeToggle').addEventListener('click', () => {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  setTheme(newTheme);
});

// 监听系统主题变化
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
  if (!localStorage.getItem('user-theme')) { // 只有用户未手动切换时才跟随系统
    setTheme(e.matches ? 'dark' : 'light');
  }
});

// 页面加载时初始化
window.addEventListener('DOMContentLoaded', initTheme);
</script>

</body>
</html>
